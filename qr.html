<!DOCTYPE html>
<html>
<head><title>Jarvis - Scan QR</title>
<style>
body { background: #0a0a1a; color: #fff; font-family: -apple-system; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
.card { text-align: center; padding: 40px; }
img { width: 300px; height: 300px; border-radius: 16px; margin: 20px 0; }
h1 { font-size: 24px; margin-bottom: 8px; }
p { color: rgba(255,255,255,0.5); font-size: 14px; }
.code { background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 8px; font-family: monospace; font-size: 13px; color: #6c5ce7; display: inline-block; }
</style></head>
<body>
<div class="card">
  <h1>📱 Jarvis Mobile</h1>
  <p>Scan with your iPhone Camera</p>
  <img src="qr.png" alt="QR Code" />
  <p>Or enter this URL in Expo Go:</p>
  <div class="code">exp://192.168.1.166:8081</div>
</div>
</body>
</html>
