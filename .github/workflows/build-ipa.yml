name: Build IPA for SideStore

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'services/**'
      - 'app.json'
      - 'package.json'
      - 'eas.json'

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build IPA (unsigned - SideStore handles signing)
        run: |
          npx expo export --platform ios 2>&1
          mkdir -p Payload
          APP_DIR=$(find . -type d -name "*.app" 2>/dev/null | head -1)
          if [ -n "$APP_DIR" ]; then
            cp -r "$APP_DIR" Payload/
            zip -r jarvis.ipa Payload/
            rm -rf Payload
            echo "✅ unsigned IPA built with .app"
          else
            # Bundle the dist/ios folder as a minimal IPA
            echo "Creating IPA from dist/ios..."
            cp -r dist/ios Payload/Jarvis.app
            zip -r jarvis.ipa Payload/
            rm -rf Payload
          fi
          ls -lh jarvis.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-ipa
          path: ./jarvis.ipa
          retention-days: 30