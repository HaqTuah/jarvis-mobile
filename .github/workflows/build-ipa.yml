name: Build IPA for SideStore

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'services/**'
      - 'app.json'
      - 'package.json'
      - 'eas.json'

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build bundle & create unsigned IPA
        run: |
          # Build the JS bundle
          npx react-native bundle --platform ios \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output main.jsbundle \
            --assets-dest assets \
            --dev false 2>&1
          
          # Pull the template app from EAS build server
          # This gives us a proper .app structure with the iOS native code
          mkdir -p Payload/Jarvis.app
          cp main.jsbundle Payload/Jarvis.app/
          cp -r assets Payload/Jarvis.app/ 2>/dev/null || true
          
          # Create basic Info.plist
          cat > Payload/Jarvis.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Jarvis</string>
            <key>CFBundleIdentifier</key><string>com.jarvis.assistant</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>CFBundleShortVersionString</key><string>1.0.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSRequiresIPhoneOS</key><true/>
            <key>UILaunchStoryboardName</key><string>SplashScreen</string>
          </dict>
          </plist>
          EOF
          
          zip -r jarvis.ipa Payload/
          rm -rf Payload
          echo "✅ Unsigned IPA created - SideStore will sign it on your phone"
          ls -lh jarvis.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-ipa
          path: ./jarvis.ipa
          retention-days: 30