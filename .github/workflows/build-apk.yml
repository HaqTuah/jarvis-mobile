name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build with Expo
        run: npx expo run:android --no-install 2>&1 || true
      - name: Find and save APK
        run: |
          mkdir -p artifacts
          find . -name "*.apk" -type f -exec cp {} artifacts/ \; 2>/dev/null || true
          find /root/.gradle -name "*.apk" -type f -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -la artifacts/ || true
      - uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: artifacts/*.apk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx expo export --platform android
      - uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: dist/android
