workflows:
  build-ipa:
    name: Build IPA for SideStore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    environment:
      vars:
        EXPO_PUBLIC_SERVER_URL: https://jarvis-server-production-692e.up.railway.app
      groups:
        - app_store_credentials
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          npm ci --legacy-peer-deps --ignore-scripts
      - name: Build IPA
        script: |
          npx expo export --platform ios 2>&1
          mkdir -p Payload
          cp -r dist/ios/* Payload/Jarvis.app 2>/dev/null || true
          zip -r jarvis.ipa Payload/ 2>/dev/null || true
          rm -rf Payload
          ls -lh jarvis.ipa 2>/dev/null && echo "✅ IPA created" || echo "⚠️ Trying EAS..."
          if [ ! -f jarvis.ipa ]; then
            npm install -g eas-cli
            eas build --platform ios --profile sidestore --local \
              --output ./jarvis.ipa --non-interactive
          fi
    artifacts:
      - jarvis.ipa
    publishing:
      email:
        recipients:
          - mhaq12333@gmail.com