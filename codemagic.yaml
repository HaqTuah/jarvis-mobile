workflows:
  build-ipa:
    name: Build IPA for SideStore
    triggering:
      events:
        - push
        - manual
      branch_patterns:
        - pattern: master
          include: true
    environment:
      vars:
        EXPO_PUBLIC_SERVER_URL: https://jarvis-server-production-692e.up.railway.app
      groups:
        - app_store_credentials
      node: 20
    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps --ignore-scripts
      - name: Build IPA
        script: |
          npx eas build --platform ios --profile sidestore --local \
            --output ./jarvis.ipa --non-interactive
    artifacts:
      - jarvis.ipa
    publishing:
      email:
        recipients:
          - mhaq12333@gmail.com