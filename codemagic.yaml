workflows:
  build-ipa:
    name: Build IPA for SideStore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    environment:
      vars:
        EXPO_PUBLIC_SERVER_URL: https://jarvis-server-production-692e.up.railway.app
        EXPO_NO_DEPLOY: "1"
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          npm ci --legacy-peer-deps --ignore-scripts
          npm install -g eas-cli expo-cli
      - name: Build IPA
        script: |
          eas build --platform ios --profile sidestore --local \
            --output ./jarvis.ipa --non-interactive
    artifacts:
      - jarvis.ipa
    publishing:
      email:
        recipients:
          - mhaq12333@gmail.com